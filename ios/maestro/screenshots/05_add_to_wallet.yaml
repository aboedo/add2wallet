appId: com.andresboedo.add2wallet
---
# Screenshot 5: Apple Wallet modal (PKAddPassesViewController)
# Uses demo flow — date is overridden to future in screenshot mode via ContentViewModel
- launchApp:
    clearState: true
    arguments:
      SCREENSHOT_MODE: "1"
- hideKeyboard:
    optional: true
- tapOn:
    text: "Cancel"
    optional: true
- tapOn:
    text: "or try a demo"
- tapOn:
    text: "Create Pass"
- extendedWaitUntil:
    visible:
      text: "Add to Wallet"
    timeout: 60000
- waitForAnimationToEnd
- tapOn:
    text: "Add to Wallet"
- waitForAnimationToEnd
- takeScreenshot: screenshots/05_add_to_wallet
