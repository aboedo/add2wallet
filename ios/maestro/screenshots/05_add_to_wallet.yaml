appId: com.andresboedo.add2wallet
---
# Screenshot 5: Apple Wallet modal (PKAddPassesViewController)
- launchApp:
    clearState: false
- tapOn:
    text: "or try a demo"
- tapOn:
    text: "Create Pass"
- extendedWaitUntil:
    visible:
      text: "Add to Wallet"
    timeout: 60000
- waitForAnimationToEnd
- tapOn:
    text: "Add to Wallet"
# Wait for PKAddPassesViewController to present
- waitForAnimationToEnd
- takeScreenshot: screenshots/05_add_to_wallet
